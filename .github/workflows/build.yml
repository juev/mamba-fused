name: build-and-push

# Native amd64 build on a GitHub-hosted runner (vast.ai GPUs are x86_64).
# Pushes to ghcr.io/juev/mamba-fused via the built-in GITHUB_TOKEN — no PAT needed.
# After the first run, make the package public once (Settings -> Packages) so vast
# can pull anonymously; otherwise vast needs --login with a read:packages token.

on:
  push:
    branches: [main]
    paths: [Dockerfile, .github/workflows/build.yml]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # The CUDA devel image + build artifacts blow past the ~14 GB default free
      # disk. Reclaim space the runner doesn't need for a Docker build.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/juev/mamba-fused:cu121-torch23-sm89
            ghcr.io/juev/mamba-fused:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
